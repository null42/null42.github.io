<svg viewBox="0 0 800 400" style="width:100%;max-width:800px" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#e74c3c"/>
    </marker>
    <marker id="arrowL" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6 Z" fill="#e74c3c"/>
    </marker>
    <marker id="arrowTime" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2c3e50"/>
    </marker>
  </defs>

  <!-- 垂直参考线 (ZERO和PEAK点) -->
  <line x1="130" y1="15" x2="130" y2="260" stroke="#bdc3c7" stroke-dasharray="3,3"/>
  <line x1="256" y1="15" x2="256" y2="260" stroke="#bdc3c7" stroke-dasharray="3,3"/>
  <line x1="382" y1="15" x2="382" y2="260" stroke="#bdc3c7" stroke-dasharray="3,3"/>
  <line x1="508" y1="15" x2="508" y2="260" stroke="#bdc3c7" stroke-dasharray="3,3"/>
  <line x1="634" y1="15" x2="634" y2="260" stroke="#bdc3c7" stroke-dasharray="3,3"/>
  <line x1="760" y1="15" x2="760" y2="260" stroke="#bdc3c7" stroke-dasharray="3,3"/>

  <!-- Row 1: PWM计数器 -->
  <text x="65" y="47" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="12" fill="#2c3e50" text-anchor="middle">PWM计数器</text>
  <polyline points="130,67 256,22 382,67 508,22 634,67 760,22" fill="none" stroke="#2c3e50" stroke-width="2"/>
  <text x="130" y="82" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="9" fill="#95a5a6" text-anchor="middle">ZERO</text>
  <text x="256" y="17" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="9" fill="#95a5a6" text-anchor="middle">PEAK</text>
  <text x="382" y="82" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="9" fill="#95a5a6" text-anchor="middle">ZERO</text>
  <text x="508" y="17" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="9" fill="#95a5a6" text-anchor="middle">PEAK</text>
  <text x="634" y="82" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="9" fill="#95a5a6" text-anchor="middle">ZERO</text>

  <!-- Row 2: ADC采样 -->
  <text x="65" y="110" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="12" fill="#2c3e50" text-anchor="middle">ADC采样</text>
  <line x1="130" y1="107" x2="760" y2="107" stroke="#2980b9" stroke-width="1.5"/>
  <polygon points="382,97 390,107 382,117 374,107" fill="#2980b9"/>
  <text x="400" y="100" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="10" fill="#2980b9" font-weight="bold">★ ADC触发</text>
  <text x="400" y="125" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="9" fill="#2980b9" font-style="italic">(COUNTER=ZERO时触发)</text>

  <!-- Row 3: ISR执行 -->
  <text x="65" y="175" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="12" fill="#2c3e50" text-anchor="middle">ISR执行</text>
  <rect x="384" y="155" width="191" height="42" fill="#27ae60" fill-opacity="0.3" stroke="#27ae60" stroke-width="1.5" rx="3"/>
  <line x1="442" y1="155" x2="442" y2="197" stroke="#27ae60" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="518" y1="155" x2="518" y2="197" stroke="#27ae60" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="413" y="180" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="10" fill="#27ae60" text-anchor="middle">ADC转换</text>
  <text x="480" y="180" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="10" fill="#27ae60" text-anchor="middle">PI计算</text>
  <text x="553" y="180" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="10" fill="#27ae60" text-anchor="middle">写CMPA</text>

  <!-- Row 4: PWM更新 -->
  <text x="65" y="240" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="12" fill="#2c3e50" text-anchor="middle">PWM更新</text>
  <line x1="130" y1="237" x2="760" y2="237" stroke="#8e44ad" stroke-width="1.5"/>
  <polygon points="634,227 642,237 634,247 626,237" fill="#8e44ad"/>
  <text x="650" y="230" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="10" fill="#8e44ad" font-weight="bold">★ 影子寄存器</text>
  <text x="650" y="255" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="9" fill="#8e44ad" font-style="italic">装载生效</text>

  <!-- 时间轴 -->
  <line x1="130" y1="270" x2="770" y2="270" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arrowTime)"/>
  <text x="775" y="274" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="10" fill="#2c3e50">时间 t</text>

  <!-- Tsw周期标注 -->
  <line x1="130" y1="277" x2="130" y2="283" stroke="#7f8c8d" stroke-width="1"/>
  <line x1="382" y1="277" x2="382" y2="283" stroke="#7f8c8d" stroke-width="1"/>
  <line x1="130" y1="280" x2="382" y2="280" stroke="#7f8c8d" stroke-width="1"/>
  <text x="256" y="289" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="8" fill="#7f8c8d" text-anchor="middle">Tsw</text>

  <!-- 延迟标注 (关键信息) -->
  <line x1="382" y1="298" x2="634" y2="298" stroke="#e74c3c" stroke-width="2" marker-start="url(#arrowL)" marker-end="url(#arrowR)"/>
  <line x1="382" y1="290" x2="382" y2="306" stroke="#e74c3c" stroke-width="2"/>
  <line x1="634" y1="290" x2="634" y2="306" stroke="#e74c3c" stroke-width="2"/>
  <text x="508" y="292" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="11" fill="#e74c3c" text-anchor="middle" font-weight="bold">总延迟 Td = 1.0 × Tsw（一个完整开关周期！）</text>

  <!-- 警告框 -->
  <rect x="130" y="316" width="540" height="78" fill="#fdedec" stroke="#e74c3c" stroke-width="1.5" rx="6"/>
  <text x="400" y="337" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="10" fill="#e74c3c" text-anchor="middle">如果ISR触发和PWM装载在同一时刻ZERO，</text>
  <text x="400" y="355" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="10" fill="#e74c3c" text-anchor="middle">但ADC转换+计算需要时间，新值来不及在当前周期装载，</text>
  <text x="400" y="373" font-family="-apple-system, 'Microsoft YaHei', sans-serif" font-size="10" fill="#e74c3c" text-anchor="middle" font-weight="bold">就会延迟到下一个周期 → Td = 2.0 × Tsw !!!</text>
</svg>